name: 🐛 Bug Report
description: Create a bug report to help us improve CogniMesh
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!
        
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
      placeholder: When I do X, Y happens instead of Z...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Run command '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear description of what you expected to happen
      placeholder: I expected...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened instead
      placeholder: Instead, I saw...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs and Error Messages
      description: Paste any relevant logs or error messages
      render: shell

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which CogniMesh component is affected?
      options:
        - BIOS (github-client, update-manager, patch-verifier)
        - Core Engine
        - MCP Integration
        - Task System
        - Router/Routing
        - Dashboard
        - WebSocket Server
        - Security Module
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: What version of CogniMesh are you using?
      placeholder: e.g., v5.0.0
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Your system information
      value: |
        - OS: (e.g., Windows 11, macOS 14, Ubuntu 22.04)
        - Node.js: (e.g., 20.11.0)
        - Browser: (if applicable)
      render: markdown

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      description: Before submitting this report
      options:
        - label: I have searched existing issues to ensure this bug hasn't been reported
          required: true
        - label: I have provided enough information for reproduction
          required: true
        - label: I have included relevant logs and error messages
          required: false
