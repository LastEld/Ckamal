name: 💡 Feature Request
description: Suggest an idea for CogniMesh
title: "[Feature]: "
labels: ["enhancement", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a new feature!

  - type: textarea
    id: problem
    attributes:
      label: Related Problem
      description: Is your feature request related to a problem? Please describe.
      placeholder: I'm always frustrated when...

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: A clear description of what you want to happen
      placeholder: It would be great if...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or features you've considered
      placeholder: I also thought about...

  - type: textarea
    id: implementation
    attributes:
      label: Possible Implementation
      description: If you have ideas on how to implement this, share them here
      placeholder: This could be implemented by...

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you?
      options:
        - Critical - blocks my work
        - High - significantly improves experience
        - Medium - nice to have
        - Low - would be convenient
      default: 2

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component would this feature affect?
      options:
        - BIOS (github-client, update-manager, patch-verifier)
        - Core Engine
        - MCP Integration
        - Task System
        - Router/Routing
        - Dashboard
        - WebSocket Server
        - Security Module
        - Documentation
        - Other

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or examples
      placeholder: More details...

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      description: Before submitting this request
      options:
        - label: I have searched existing issues to ensure this feature hasn't been requested
          required: true
        - label: I have provided a clear description of the feature
          required: true
        - label: I have explained why this feature would be useful
          required: true
