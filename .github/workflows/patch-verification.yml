name: Patch Verification

on:
  pull_request:
    branches:
      - main
      - develop
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main
      - develop
      - 'codex/**'
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/**'

jobs:
  release-gate:
    name: Release Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run release verification
        run: npm run verify:release

      - name: Run build smoke
        run: npm run build -- --skip-lint

      - name: Publish verification summary
        if: always()
        run: |
          {
            echo "# Patch Verification"
            echo
            echo "- Node: 20.x"
            echo "- Release gate: \`npm run verify:release\`"
            echo "- Build smoke: \`npm run build -- --skip-lint\`"
          } > VERIFICATION_REPORT.md
          cat VERIFICATION_REPORT.md

      - name: Upload verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-report
          path: VERIFICATION_REPORT.md
