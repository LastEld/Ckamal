<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="innerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGradient)"/>
  
  <!-- Hexagon shape -->
  <g transform="translate(256, 256)" filter="url(#shadow)">
    <path d="M 0,-120 L 104,-60 L 104,60 L 0,120 L -104,60 L -104,-60 Z" 
          fill="none" 
          stroke="white" 
          stroke-width="24"
          stroke-linecap="round"
          stroke-linejoin="round"/>
    
    <!-- Inner hexagon -->
    <path d="M 0,-60 L 52,-30 L 52,30 L 0,60 L -52,30 L -52,-30 Z" 
          fill="white"
          opacity="0.3"/>
    
    <!-- Center dot -->
    <circle cx="0" cy="0" r="20" fill="white"/>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="80" cy="80" r="12" fill="white" opacity="0.4"/>
  <circle cx="432" cy="80" r="8" fill="white" opacity="0.3"/>
  <circle cx="80" cy="432" r="8" fill="white" opacity="0.3"/>
  <circle cx="432" cy="432" r="12" fill="white" opacity="0.4"/>
</svg>
