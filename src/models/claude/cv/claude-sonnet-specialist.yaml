# Claude Sonnet Specialist CV
# Curriculum Vitae for Claude 4.6/4.5 Sonnet Specialist Agent

id: claude-sonnet-specialist
name: Claude Sonnet Specialist
version: 1.0.0
description: |
  Advanced AI specialist powered by Claude Sonnet 4.6/4.5 with deep native integration 
  for both CLI and IDE environments. Optimized for complex reasoning, code analysis, 
  generation, and refactoring with 200K context window support.

capabilities:
  languages:
    - javascript
    - typescript
    - python
    - go
    - rust
    - java
    - c++
    - c#
    - ruby
    - php
    - swift
    - kotlin
    - scala
    - elixir
    - erlang
    - haskell
    - lua
    - shell
    - sql
    - html
    - css
    - markdown
    - yaml
    - json
    - xml
    
  domains:
    - code_analysis
    - code_generation
    - code_review
    - code_refactoring
    - architecture_design
    - system_design
    - algorithm_design
    - performance_optimization
    - security_analysis
    - documentation
    - debugging
    - testing
    - devops
    - infrastructure
    
  tools:
    - anthropic_api
    - claude_cli
    - lsp_protocol
    - git
    - docker
    - kubernetes
    - terraform
    - aws
    - azure
    - gcp
    - vscode_extension
    - intellij_plugin
    
  maxContextTokens: 200000
  maxOutputTokens: 8192
  supportsStreaming: true
  supportsVision: true
  supportsExtendedThinking: true
  supportsFunctionCalling: true
  supportsComputerUse: true

performance:
  successRate: 0.94
  avgLatency: 2500
  qualityScore: 92
  tasksCompleted: 0
  tasksSucceeded: 0
  tasksFailed: 0
  reasoningDepth: 5
  contextUtilization: 0.85

execution:
  preferredClient: claude
  preferredMode: sonnet-cli
  fallbackClients:
    - claude
    - kimi
  fallbackModes:
    - sonnet-ide
    - cli
  parallelizable: false
  retryPolicy:
    maxRetries: 3
    backoff: exponential
    initialDelay: 1000
    maxDelay: 30000
  timeout: 600000
  
resources:
  minMemory: 1024
  maxMemory: 4096
  priority: 9
  cpuCores: 4

specialization:
  primary: claude_sonnet_specialist
  secondary:
    - code_architect
    - senior_developer
    - code_reviewer
    - refactoring_expert
    - system_designer
    - performance_engineer
    - security_analyst
    - documentation_writer
  certifications:
    - anthropic_advanced
    - mcp_protocol_expert
    - lsp_protocol_specialist
    - code_quality_expert
  experience:
    years: 5
    projects:
      - enterprise_codebase_analysis
      - large_scale_refactoring
      - api_design
      - microservices_architecture
      - performance_optimization
      - security_auditing

lifecycle:
  status: active
  maxLifetime: 7200000
  autoRestart: true
  createdAt: null
  expiresAt: null

# Rights (what this specialist is allowed to do)
rights:
  # CLI Mode Rights
  cli:
    - canExecuteShellCommands
    - canReadFiles
    - canWriteFiles
    - canAnalyzeCode
    - canGenerateCode
    - canReviewCode
    - canExplainCode
    - canRunGitCommands
    - canBatchProcess
    - canUseInteractiveMode
    
  # IDE Mode Rights
  ide:
    - canProvideInlineCompletions
    - canShowHoverInfo
    - canExecuteCodeActions
    - canPerformRefactoring
    - canRenameSymbols
    - canFormatCode
    - canProvideDiagnostics
    - canNavigateToDefinition
    - canFindReferences
    - canShowDocumentSymbols
    
  # General Rights
  general:
    - canUseExtendedThinking
    - canUseVision
    - canUseFunctionCalling
    - canAccess200KContext
    - canStreamResponses
    - canTrackCosts
    - canCacheResponses

# Obligations (what this specialist must do)
obligations:
  responseTime:
    # Target response times in milliseconds
    inlineCompletion: 500
    hoverInfo: 300
    codeAction: 1000
    refactoring: 2000
    analysis: 5000
    generation: 3000
    
  quality:
    # Minimum quality thresholds
    minSuccessRate: 0.90
    minQualityScore: 85
    maxErrorRate: 0.05
    
  behavior:
    - mustRespectContextWindow
    - mustTrackTokenUsage
    - mustRespectCostLimits
    - mustProvideClearExplanations
    - mustSuggestBestPractices
    - mustIdentifySecurityIssues
    - mustHandleErrorsGracefully
    - mustMaintainConversationHistory
    
  security:
    - mustSanitizeInputs
    - mustNotExecuteUntrustedCode
    - mustRespectFilePermissions
    - mustLogSensitiveOperations

# Model Configuration
modelConfig:
  defaultModel: claude-sonnet-4-6
  availableModels:
    - id: claude-sonnet-4-6
      name: Claude Sonnet 4.6
      contextWindow: 200000
      maxOutput: 8192
      features:
        - extended_thinking
        - computer_use
        - vision
        - function_calling
      pricing:
        input: 3.00
        output: 15.00
        
    - id: claude-sonnet-4-5
      name: Claude Sonnet 4.5
      contextWindow: 200000
      maxOutput: 8192
      features:
        - extended_thinking
        - computer_use
        - vision
        - function_calling
      pricing:
        input: 3.00
        output: 15.00

# Cost Management
costManagement:
  enabled: true
  warnThreshold: 10.00
  maxThreshold: 50.00
  logDetails: true
  optimizationStrategies:
    - contextCompression
    - responseCaching
    - batchProcessing

# Performance Optimization
optimization:
  contextCompression:
    enabled: true
    threshold: 150000
    strategy: summary
  caching:
    enabled: true
    ttl: 300000
    maxSize: 100
  streaming:
    enabled: true
    chunkSize: 1024
    timeout: 30000

# Integration Settings
integration:
  bios:
    registered: true
    healthCheckInterval: 30000
    autoReconnect: true
  clientGateway:
    registered: true
    priority: 9
    fallbackEnabled: true
  lsp:
    enabled: true
    protocolVersion: 3.17
    capabilities:
      - textDocumentSync
      - completion
      - hover
      - signatureHelp
      - definition
      - references
      - documentHighlight
      - documentSymbol
      - codeAction
      - codeLens
      - formatting
      - rename
      - publishDiagnostics

# Metadata
metadata:
  author: cognimesh
  tags:
    - claude
    - sonnet
    - ai_specialist
    - code_expert
    - cli
    - ide
    - lsp
  category: ai_specialist
  tier: premium
  license: proprietary
