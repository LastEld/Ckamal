# GPT 5.4 Codex Specialist Agent CV
# CKAMAL Autonomous BIOS-Substrate Agent Definition
# Version: 1.0.0

metadata:
  id: gpt-5-4-codex-specialist
  name: GPT 5.4 Codex Specialist
  version: 1.0.0
  category: ai-model-specialist
  author: CKAMAL Build Agent #6
  created_at: 2026-03-23
  tags:
    - gpt
    - codex
    - openai
    - specialist
    - coding
    - architecture
    - reasoning
    - 256k-context
    - advanced-reasoning
    - multimodal

description: |
  The GPT 5.4 Codex Specialist is a deep native integration agent for OpenAI's
  GPT 5.4 Codex model within the CKAMAL CogniMesh BIOS substrate. This specialist
  leverages the 256K token context window and advanced reasoning capabilities
  to provide superior performance on complex coding tasks, architecture design,
  algorithm optimization, and multi-file refactoring.
  
  Key capabilities include:
  - Chain-of-thought and advanced reasoning modes
  - Complex system architecture design
  - Multi-file refactoring with behavior preservation
  - Algorithm design and optimization
  - Multimodal analysis (code + images)
  - Performance and security analysis
  - Full system design documentation
  
  Unlike basic API wrappers, this specialist provides:
  - Native protocol implementation with streaming
  - Session management with checkpoint support
  - Cost tracking and budget governance
  - Three integration modes (App, CLI, IDE)
  - Project-wide analysis capabilities

capabilities:
  languages:
    - javascript
    - typescript
    - python
    - java
    - c
    - cpp
    - csharp
    - go
    - rust
    - ruby
    - php
    - swift
    - kotlin
    - scala
    - r
    - html
    - css
    - scss
    - sass
    - sql
    - shell
    - yaml
    - json
    - xml
    - markdown
    - toml
  
  domains:
    - software-architecture
    - system-design
    - code-generation
    - code-review
    - refactoring
    - debugging
    - algorithm-design
    - api-design
    - database-design
    - performance-optimization
    - security-analysis
    - test-generation
    - documentation
    - multimodal-analysis
  
  tools:
    - gpt54-client
    - gpt54-config
    - gpt54-app-client
    - gpt54-cli-client
    - gpt54-ide-client
    - reasoning-engine
    - streaming-protocol
    - checkpoint-manager
    - cost-tracker
    - file-analyzer
    - multimodal-processor
  
  maxContextTokens: 256000
  maxOutputTokens: 32768
  maxReasoningTokens: 8192
  supportsStreaming: true
  supportsVision: true
  supportsReasoning: true
  supportsFunctionCalling: true
  supportsSessionPersistence: true
  supportsMultiFileAnalysis: true
  supportsCheckpoints: true
  supportsMultimodal: true

performance:
  qualityScore: 96
  successRate: 0.96
  avgLatency: 4500
  tasksCompleted: 0
  tasksSucceeded: 0
  tasksFailed: 0
  lastUpdated: 2026-03-23

execution:
  preferredClient: gpt-5.4-codex
  fallbackClients:
    - gpt-5.4-codex-mini
    - gpt-5.4-codex-vision
    - claude-opus-4-6
    - kimi-k2-5
  parallelizable: false
  retryPolicy:
    maxRetries: 3
    backoff: exponential
    initialDelay: 1000
    maxDelay: 30000
  timeout: 600000

resources:
  minMemory: 256
  maxMemory: 2048
  priority: 9
  cpuCores: 2

specialization:
  primary: advanced-coding-reasoning
  secondary:
    - system-architecture
    - complex-refactoring
    - algorithm-design
    - multimodal-analysis
    - performance-optimization
    - security-audit
  certifications:
    - gpt-5.4-codex-native-protocol
    - 256k-context-management
    - advanced-reasoning-engine
    - multimodal-integration
  experience:
    years: 0
    projects: []

lifecycle:
  status: active
  maxLifetime: 86400000
  autoRestart: true
  healthCheckInterval: 30000

# Rights define what this agent is allowed to do
rights:
  token_allocation:
    maxContextTokens: 256000
    maxOutputTokens: 32768
    maxReasoningTokens: 8192
    optimalWorkingContext: 200000
    compressionThreshold: 0.85
    prioritizationThreshold: 0.95
  
  session_management:
    maxSessionsPerUser: 10
    sessionTTL: 86400000
    allowSessionSharing: true
    allowSessionRecovery: true
    maxCheckpointsPerSession: 50
  
  reasoning_modes:
    enabled: true
    modes:
      - standard
      - chain_of_thought
      - step_by_step
      - comparative
      - analysis
      - synthesis
    defaultMode: chain_of_thought
    minEffort: low
    maxEffort: high
  
  cost_management:
    dailyBudgetLimit: 50.00
    monthlyBudgetLimit: 500.00
    alertThreshold: 0.8
    trackUsagePerSession: true
    enableCostOptimizationSuggestions: true
  
  file_operations:
    maxFileSize: 104857600
    maxFilesPerRequest: 20
    maxImagesPerRequest: 10
    supportedFormats:
      - txt
      - md
      - json
      - js
      - ts
      - jsx
      - tsx
      - mjs
      - cjs
      - py
      - java
      - cpp
      - c
      - h
      - hpp
      - cs
      - csproj
      - sln
      - go
      - rs
      - rb
      - php
      - swift
      - kt
      - scala
      - r
      - html
      - css
      - scss
      - less
      - sass
      - xml
      - yaml
      - yml
      - toml
      - sql
      - sh
      - bash
      - ps1
      - zsh
      - fish
      - dockerfile
      - makefile
      - cmake
      - gradle
      - png
      - jpg
      - jpeg
      - gif
      - webp
      - bmp
      - svg
  
  coding_tasks:
    - code-completion
    - code-generation
    - code-review
    - refactoring
    - debug-assistance
    - architecture-design
    - algorithm-design
    - test-generation
    - documentation
    - security-audit
    - performance-analysis
    - system-design
  
  multimodal:
    enabled: true
    maxImageSize: 20971520
    supportedImageFormats:
      - png
      - jpg
      - jpeg
      - gif
      - webp
      - bmp
    visionModel: gpt-5.4-codex-vision
  
  streaming:
    enabled: true
    chunkSize: 4096
    maxStreamDuration: 600000
    supportReasoningStream: true
    supportContentStream: true

# Obligations define what this agent must do
obligations:
  quality_standards:
    minimumQualityScore: 90
    requireTestsForGeneratedCode: true
    requireDocumentationForPublicAPIs: true
    followProjectStyleGuide: true
    preserveExistingFunctionality: true
    provideReasoningWhenRequested: true
  
  reasoning_requirements:
    showReasoningProcess: true
    explainComplexDecisions: true
    provideAlternativeApproaches: true
    highlightAssumptions: true
    acknowledgeLimitations: true
  
  response_requirements:
    maxResponseTime: 600000
    acknowledgeReceiptWithin: 3000
    provideProgressUpdates: true
    streamForLongOperations: true
    formatOutputAppropriately: true
  
  context_management:
    compressWhenThresholdReached: true
    prioritizeWhenThresholdReached: true
    maintainSessionHistory: true
    persistCheckpointsBeforeMajorChanges: true
    manageContextEfficiently: true
  
  cost_efficiency:
    trackAllTokenUsage: true
    reportCostPerRequest: true
    warnWhenBudgetThresholdReached: true
    suggestCostOptimizations: true
    useAppropriateModelVariant: true
  
  error_handling:
    retryOnTransientErrors: true
    maxRetryAttempts: 3
    fallbackToAlternativeModels: true
    preserveContextOnError: true
    reportErrorsWithContext: true
    provideRecoverySuggestions: true
  
  security:
    validateAllInputs: true
    sanitizeFilePaths: true
    respectGitIgnorePatterns: true
    noCredentialExposure: true
    scanForSecurityIssues: true
    suggestSecurityImprovements: true
  
  multimodal_handling:
    validateImageFormats: true
    respectImageSizeLimits: true
    analyzeImageCodeRelationship: true
    provideVisualInsights: true
  
  logging:
    logAllRequests: true
    logSessionStateChanges: true
    logCostTracking: true
    logErrorsWithStack: true
    logReasoningSteps: true
    logCheckpointOperations: true

# Integration configuration
integration:
  protocol: openai-api
  transport: https
  api:
    baseUrl: https://api.openai.com/v1
    version: v1
    connectionTimeout: 60000
    requestTimeout: 600000
    maxRetries: 3
  
  websocket:
    enabled: true
    url: wss://api.openai.com/v1/realtime
    connectionTimeout: 30000
    heartbeatInterval: 30000
    reconnectMaxAttempts: 5
  
  authentication:
    type: api-key
    source: environment
    envVar: OPENAI_API_KEY
  
  clients:
    app:
      enabled: true
      features:
        - session-management
        - file-upload
        - checkpoint-operations
        - project-workspace
    cli:
      enabled: true
      features:
        - interactive-repl
        - batch-processing
        - project-analysis
        - file-operations
    ide:
      enabled: true
      features:
        - intellisense
        - inline-completions
        - refactoring-suggestions
        - hover-documentation
        - code-lens
        - diagnostics
  
  dependencies:
    - module: gpt54-config
      required: true
    - module: gpt54-client
      required: true
    - module: gpt54-app
      required: false
    - module: gpt54-cli
      required: false
    - module: gpt54-ide
      required: false

# Task routing preferences
taskRouting:
  primaryTasks:
    - complex-coding
    - architecture-design
    - system-design
    - algorithm-optimization
    - multi-file-refactoring
    - advanced-reasoning
    - multimodal-analysis
    - performance-optimization
    - security-audit
  
  excludedTasks:
    - simple-chat
    - basic-qa
    - creative-writing
    - non-technical-tasks
  
  complexityThreshold:
    min: 7
    max: 10
  
  reasoningThreshold:
    minComplexity: 6
    preferReasoningFor: 
      - architecture-design
      - algorithm-design
      - complex-refactoring
      - security-audit
      - performance-analysis
  
  fallbackChain:
    - gpt-5.4-codex-mini
    - gpt-5.4-codex-vision
    - claude-opus-4-6
    - kimi-k2-5

# Monitoring and observability
monitoring:
  metrics:
    - token_usage
    - reasoning_tokens
    - cost_per_request
    - latency
    - success_rate
    - session_duration
    - context_compression_ratio
    - checkpoint_count
  
  alerts:
    - budget_threshold_exceeded
    - context_limit_approaching
    - session_recovery_failed
    - error_rate_spike
    - reasoning_token_spike
  
  tracing:
    enabled: true
    sampleRate: 1.0
    includeContext: true
    includeReasoning: true
  
  logging:
    level: info
    includePayloads: false
    includeReasoning: true
    retentionDays: 30
