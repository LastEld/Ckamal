# Developer Agent CV
# Standard development tasks and feature implementation

identity:
  id: developer
  name: Full-Stack Developer
  version: 1.3.0
  description: General-purpose developer agent for implementing features across the full stack
  lineage:
    template_origin: developer

capabilities:
  languages:
    - javascript
    - typescript
    - python
    - go
    - html
    - css
    - sql
  domains:
    - frontend
    - backend
    - database
    - api
    - mobile
  tools:
    - mcp
    - git
    - docker
    - npm
    - webpack
    - jest
    - pytest
  ai_features:
    max_context_tokens: 150000
    supports_streaming: true
    supports_vision: false
    supports_function_calling: true
    supports_parallel_tool_calls: true

rights:
  version: "1.0.0"
  resources:
    databases:
      - name: dev_db
        access: [read, write]
      - name: test_db
        access: [read, write]
    filesystem:
      - path: "/workspace/{agent.id}/**"
        access: [read, write, execute]
      - path: "/shared/libraries/**"
        access: [read]
      - path: "/system/**"
        access: []
    apis:
      - name: npm
        endpoints: [registry/*]
        allowed: true
      - name: github
        endpoints: [repos/*, gists/*]
        methods: [GET, POST]
        rate_limit: 500
    network:
      egress:
        - host: "*.npmjs.com"
          allowed: true
        - host: "*.github.com"
          ports: [443]
          allowed: true
        - host: "registry.yarnpkg.com"
          allowed: true
        - host: "*.python.org"
          allowed: true
      ingress:
        allowed: false
  models:
    allowed:
      - claude:sonnet
      - kimi:k2
      - codex:gpt54
    denied:
      - claude:opus
    max_tokens_per_request: 100000
    max_tokens_per_day: 1500000
    budget_limit_usd: 25.00
  execution:
    operations: [read, write, execute:safe]
    denied_operations:
      - execute:system
      - delete:/system/**
      - write:/system/**
    sandbox:
      enabled: true
      network: true
      filesystem: isolated
  communication:
    can_talk_to:
      - "agent:coordinator_*"
      - "agent:reviewer_*"
      - "agent:tester_*"
    can_be_delegated_by:
      - "agent:coordinator_*"
      - "agent:tech_lead_*"
    can_delegate_to: []
    channels:
      - "dev:*"
      - "code:review"
    delegation_depth: 0
  admin:
    can_create_cv: false
    can_update_own_cv: false
    can_update_others_cv: false
    can_delete_cv: false
    can_view_audit: false
    can_modify_system_config: false

obligations:
  version: "1.0.0"
  output_quality:
    accuracy:
      min_score: 0.85
    completeness:
      min_coverage_percent: 85
      check_missing: true
    format:
      default: markdown
      supported:
        - markdown
        - json
      structure_required: true
  performance:
    response_time:
      p50_max_ms: 3000
      p95_max_ms: 10000
      timeout_absolute_ms: 300000
    throughput:
      requests_per_minute: 20
    availability:
      uptime_percent: 98.0
      max_consecutive_failures: 5
  security:
    audit_logging:
      level: standard
      events:
        - task_start
        - task_complete
        - error
      retention_days: 30
    input_validation:
      sanitize_html: true
      max_input_length: 50000
  resource_limits:
    tokens:
      per_request: 100000
      per_task: 300000
      per_day: 1500000
      warning_threshold: 0.8
    cost:
      budget_usd_per_day: 25.00
      budget_usd_per_task: 5.00
      alert_threshold: 0.9
    compute:
      max_execution_time_ms: 300000
      max_memory_mb: 2048
  error_handling:
    retry_policy:
      max_attempts: 3
      backoff_strategy: exponential
      initial_delay_ms: 1000
      max_delay_ms: 30000
    fallback:
      enabled: true
      fallback_client: kimi

execution:
  preferred_client: auto
  fallback_clients: [claude, kimi, codex]
  parallelizable: true
  retry_policy:
    max_retries: 3
    backoff: exponential
    initial_delay_ms: 1000
    max_delay_ms: 30000
  timeout: 300000

resources:
  min_memory: 512
  max_memory: 2048
  priority: 5
  cpu_cores: 1

specialization:
  primary: fullstack_developer
  secondary:
    - frontend_dev
    - backend_dev
    - api_designer
  certifications:
    - mcp_core
    - git_foundation

lifecycle:
  status: active
  max_lifetime: 3600000

metadata:
  author: system
  tags:
    - developer
    - coding
    - implementation
    - fullstack
  category: worker
  domain: engineering
