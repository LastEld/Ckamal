# System Administrator Agent CV
# Full system privileges for maintenance and configuration

identity:
  id: system-admin
  name: System Administrator
  version: 2.0.0
  description: Administrative agent with system-level access for maintenance and configuration
  lineage:
    template_origin: admin

capabilities:
  languages:
    - javascript
    - typescript
    - python
    - bash
    - yaml
  domains:
    - devops
    - infrastructure
    - security
  tools:
    - mcp
    - git
    - docker
    - kubernetes
    - terraform
    - vault
  ai_features:
    max_context_tokens: 200000
    supports_streaming: true
    supports_vision: false
    supports_function_calling: true
    supports_parallel_tool_calls: true

rights:
  version: "1.0.0"
  resources:
    databases:
      - name: system_db
        access: [read, write, admin]
      - name: audit_db
        access: [read, admin]
    filesystem:
      - path: "/system/**"
        access: [read, write, execute]
      - path: "/config/**"
        access: [read, write]
      - path: "/logs/**"
        access: [read, write, delete]
    apis:
      - name: bios_api
        endpoints: ["*"]
        methods: [GET, POST, PUT, DELETE, PATCH]
        allowed: true
    network:
      egress:
        - host: "*"
          allowed: true
      ingress:
        allowed: true
  models:
    allowed:
      - claude:sonnet
      - claude:opus
      - kimi:k2
      - codex:gpt54
    max_tokens_per_request: 200000
    max_tokens_per_day: 5000000
    budget_limit_usd: 100.00
  execution:
    operations: [read, write, execute:safe, execute:system, spawn, delete]
    sandbox:
      enabled: false
  communication:
    can_talk_to:
      - "agent:*"
      - "system:*"
    can_delegate_to:
      - "agent:worker_*"
      - "agent:developer_*"
    can_be_delegated_by:
      - "system:*"
    channels:
      - "system:*"
      - "admin:*"
    delegation_depth: 3
  admin:
    can_create_cv: true
    can_update_own_cv: true
    can_update_others_cv: true
    can_delete_cv: true
    can_view_audit: true
    can_modify_system_config: true

obligations:
  version: "1.0.0"
  output_quality:
    accuracy:
      min_score: 0.95
      validation_method: automated_test
    format:
      default: markdown
      structure_required: true
  performance:
    response_time:
      p95_max_ms: 10000
      p99_max_ms: 30000
      timeout_absolute_ms: 600000
    availability:
      uptime_percent: 99.9
      max_consecutive_failures: 2
  security:
    audit_logging:
      level: comprehensive
      events: ["*"]
      retention_days: 365
      immutable: true
    secrets_management:
      vault_required: true
      credential_rotation_days: 30
      mask_in_logs: true
    encryption:
      at_rest: AES-256-GCM
      in_transit: TLS-1.3
  resource_limits:
    tokens:
      per_request: 200000
      per_task: 1000000
      per_day: 5000000
      warning_threshold: 0.8
    cost:
      budget_usd_per_day: 100.00
      budget_usd_per_task: 20.00
      alert_threshold: 0.9
  error_handling:
    retry_policy:
      max_attempts: 3
      backoff_strategy: exponential
      initial_delay_ms: 1000
      max_delay_ms: 30000
    escalation:
      enabled: true
      threshold: critical
      escalate_to: system

execution:
  preferred_client: claude
  fallback_clients: [kimi, codex]
  parallelizable: false
  retry_policy:
    max_retries: 3
    backoff: exponential
    initial_delay_ms: 1000
    max_delay_ms: 30000
  timeout: 600000

resources:
  min_memory: 1024
  max_memory: 4096
  priority: 9
  cpu_cores: 2

specialization:
  primary: system_administrator
  secondary:
    - security_officer
    - devops_engineer
    - infrastructure_architect
  certifications:
    - bios_advanced
    - security_clearance
    - infrastructure_expert

lifecycle:
  status: active
  max_lifetime: 7200000

metadata:
  author: system
  tags:
    - admin
    - system
    - privileged
    - infrastructure
    - security
  category: system
  domain: infrastructure
